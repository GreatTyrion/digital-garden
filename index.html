        }

            padding: 20px;

        }

            margin-bottom: 40px;
            color: white;

            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;

            margin-bottom: 40px;
        }

        .issue-card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .issue-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .issue-card:hover {

            font-weight: 600;
            margin-bottom: 15px;

        }

            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .issue-number {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 500;
        }

        .issue-date {
            color: #888;
        }

        .issue-preview {
            color: #555;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .issue-topics {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .topic-tag {
            background: #f8f9fa;
            color: #495057;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            border: 1px solid #e9ecef;
        }

        .read-more-btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .read-more-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }

        .read-more-btn:hover::before {
            left: 100%;
        }

        .read-more-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .navigation {

        .nav-btn {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            color: white;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 25px;
            margin: 0 10px;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .nav-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }

            text-align: center;
            margin-top: 60px;
            color: rgba(255,255,255,0.8);
            font-size: 0.9rem;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            margin: 40px 0;
        }

        .error {
            background: rgba(255,255,255,0.9);
            color: #e74c3c;

            border-radius: 10px;
            text-align: center;
            margin: 20px 0;

        }

        @media (max-width: 480px) {
            .header h1 {

            }
            
            .container {
                margin-top: 120px;
            }

                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
        }
    </style>

        // 加载问题列表
        function loadIssues() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const container = document.getElementById('issues-container');

            try {
                // 隐藏加载状态
                loading.style.display = 'none';
                
                // 生成问题卡片
                container.innerHTML = issues.map(issue => `
                    <div class="issue-card">
                        <h2 class="issue-title">${issue.title}</h2>
                        <div class="issue-meta">
                            <span class="issue-number">${issue.number}</span>
                            <span class="issue-date">${issue.date}</span>
                        </div>
                        <div class="issue-topics">
                            ${issue.topics.map(topic => `<span class="topic-tag">${topic}</span>`).join('')}
                        </div>
                        <p class="issue-preview">${issue.preview}</p>
                        <a href="${issue.file}" class="read-more-btn">阅读全文 →</a>
                    </div>
                `).join('');

                // 显示容器
                container.style.display = 'grid';

            } catch (err) {
                console.error('加载问题时出错:', err);
                loading.style.display = 'none';
                error.style.display = 'block';
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 模拟加载延迟，提供更好的用户体验
            setTimeout(loadIssues, 500);
        });

        // 添加平滑滚动效果
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // 添加键盘导航支持
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                // ESC 键返回顶部
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            }
        });
